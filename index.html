<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiTienda - Ventas Online</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', 'Open Sans', sans-serif;
        }

        body {
            background: #f5f5f5;
            color: #1e1e2a;
            padding: 2rem 1rem;
        }

        /* Contenedor principal */
        .app {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid #ddd;
        }

        h1 {
            font-size: 1.8rem;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .cart-icon {
            background: #2c3e66;
            color: white;
            padding: 0.6rem 1.2rem;
            border-radius: 40px;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        .cart-icon:hover {
            background: #1e2a4a;
            transform: scale(1.02);
        }

        /* Grid de productos */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 2rem;
            margin-bottom: 3rem;
        }

        .product-card {
            background: white;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 30px rgba(0,0,0,0.1);
        }

        .product-img {
            background: #eef2f9;
            height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
        }

        .product-info {
            padding: 1.2rem;
            flex: 1;
        }

        .product-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .product-price {
            font-size: 1.5rem;
            font-weight: 700;
            color: #2a5298;
            margin: 0.5rem 0;
        }

        .product-price::before {
            content: "$";
            font-size: 1rem;
        }

        .add-to-cart {
            background: #2a5298;
            color: white;
            border: none;
            padding: 0.7rem;
            width: 100%;
            font-weight: bold;
            font-size: 1rem;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 0.5rem;
        }

        .add-to-cart:hover {
            background: #0f3b6f;
        }

        /* Carrito lateral (modal) */
        .cart-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(3px);
            visibility: hidden;
            opacity: 0;
            transition: 0.3s;
            z-index: 1000;
        }

        .cart-overlay.open {
            visibility: visible;
            opacity: 1;
        }

        .cart-sidebar {
            position: fixed;
            right: 0;
            top: 0;
            width: 100%;
            max-width: 420px;
            height: 100%;
            background: white;
            box-shadow: -5px 0 20px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            transform: translateX(100%);
            transition: transform 0.3s ease-out;
            z-index: 1001;
        }

        .cart-overlay.open .cart-sidebar {
            transform: translateX(0);
        }

        .cart-header {
            padding: 1.5rem;
            border-bottom: 1px solid #e2e2e2;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .cart-header h2 {
            font-size: 1.5rem;
        }

        .close-cart {
            background: none;
            border: none;
            font-size: 1.8rem;
            cursor: pointer;
            font-weight: bold;
        }

        .cart-items {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.8rem 0;
            border-bottom: 1px solid #eee;
        }

        .cart-item-info {
            flex: 1;
        }

        .cart-item-title {
            font-weight: 500;
        }

        .cart-item-price {
            font-size: 0.9rem;
            color: #2a5298;
        }

        .cart-item-actions {
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .cart-item-actions button {
            background: #f0f0f0;
            border: none;
            width: 28px;
            height: 28px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 1.2rem;
            cursor: pointer;
        }

        .cart-item-actions span {
            min-width: 24px;
            text-align: center;
        }

        .cart-footer {
            padding: 1.5rem;
            border-top: 2px solid #ddd;
            background: #fafafa;
        }

        .total {
            font-size: 1.4rem;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            margin-bottom: 1.2rem;
        }

        .checkout-btn {
            background: #27ae60;
            width: 100%;
            padding: 0.9rem;
            border: none;
            color: white;
            font-weight: bold;
            font-size: 1.1rem;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.2s;
        }

        .checkout-btn:hover {
            background: #1e8e50;
        }

        .empty-cart {
            text-align: center;
            color: #888;
            padding: 2rem;
        }

        /* Toast simple */
        .toast-msg {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e1e2a;
            color: white;
            padding: 0.7rem 1.4rem;
            border-radius: 40px;
            font-size: 0.9rem;
            z-index: 1100;
            opacity: 0;
            transition: 0.2s;
            pointer-events: none;
        }

        .toast-msg.show {
            opacity: 1;
        }

        @media (max-width: 640px) {
            body {
                padding: 1rem;
            }
            .products-grid {
                gap: 1rem;
            }
        }
    </style>
</head>
<body>
<div class="app">
    <header>
        <h1>🛍️ Tienda Esencia</h1>
        <div class="cart-icon" id="cartIcon">
            🛒 Carrito <span id="cartCount">0</span>
        </div>
    </header>

    <div class="products-grid" id="productsContainer"></div>
</div>

<!-- Modal carrito -->
<div class="cart-overlay" id="cartOverlay">
    <div class="cart-sidebar">
        <div class="cart-header">
            <h2>Tu carrito</h2>
            <button class="close-cart" id="closeCartBtn">&times;</button>
        </div>
        <div class="cart-items" id="cartItemsList">
            <div class="empty-cart">🛒 El carrito está vacío</div>
        </div>
        <div class="cart-footer">
            <div class="total">
                <span>Total:</span>
                <span id="cartTotal">$0.00</span>
            </div>
            <button class="checkout-btn" id="checkoutBtn">Finalizar compra</button>
        </div>
    </div>
</div>

<div id="toastMsg" class="toast-msg">✨ Producto agregado</div>

<script>
    // ---------- DATOS DE PRODUCTOS ----------
    const productos = [
        { id: 1, nombre: "Auriculares Bluetooth", precio: 49.99, emoji: "🎧", stock: 10 },
        { id: 2, nombre: "Mochila Urbana", precio: 39.90, emoji: "🎒", stock: 8 },
        { id: 3, nombre: "Reloj Inteligente", precio: 89.00, emoji: "⌚", stock: 5 },
        { id: 4, nombre: "Camiseta Deportiva", precio: 24.50, emoji: "👕", stock: 15 },
        { id: 5, nombre: "Libro Best Seller", precio: 18.30, emoji: "📚", stock: 12 },
        { id: 6, nombre: "Lámpara LED", precio: 32.20, emoji: "💡", stock: 7 }
    ];

    // Estado del carrito: { id, nombre, precio, cantidad }
    let cart = [];

    // Elementos DOM
    const productsContainer = document.getElementById("productsContainer");
    const cartIcon = document.getElementById("cartIcon");
    const cartOverlay = document.getElementById("cartOverlay");
    const closeCartBtn = document.getElementById("closeCartBtn");
    const cartItemsList = document.getElementById("cartItemsList");
    const cartTotalSpan = document.getElementById("cartTotal");
    const cartCountSpan = document.getElementById("cartCount");
    const checkoutBtn = document.getElementById("checkoutBtn");
    const toastMsg = document.getElementById("toastMsg");

    // Funciones auxiliares
    function showToast(message = "Producto agregado") {
        toastMsg.textContent = message;
        toastMsg.classList.add("show");
        setTimeout(() => {
            toastMsg.classList.remove("show");
        }, 1800);
    }

    // Guardar carrito en localStorage (opcional, para persistencia)
    function saveCartToLocal() {
        localStorage.setItem("tiendaCart", JSON.stringify(cart));
    }

    function loadCartFromLocal() {
        const stored = localStorage.getItem("tiendaCart");
        if (stored) {
            try {
                cart = JSON.parse(stored);
                // validar estructura mínima
                if (!Array.isArray(cart)) cart = [];
            } catch(e) { cart = []; }
        } else {
            cart = [];
        }
        renderCartUI();
        updateCartCounter();
    }

    // Actualizar contador del header
    function updateCartCounter() {
        const totalItems = cart.reduce((acc, item) => acc + item.cantidad, 0);
        cartCountSpan.textContent = totalItems;
    }

    // Calcular total del carrito
    function computeTotal() {
        return cart.reduce((sum, item) => sum + (item.precio * item.cantidad), 0);
    }

    // Refrescar vista del carrito (lista y total)
    function renderCartUI() {
        if (!cartItemsList) return;

        if (cart.length === 0) {
            cartItemsList.innerHTML = `<div class="empty-cart">🛒 El carrito está vacío</div>`;
            cartTotalSpan.textContent = `$0.00`;
            updateCartCounter();
            return;
        }

        let html = '';
        cart.forEach((item, idx) => {
            html += `
                <div class="cart-item" data-item-id="${item.id}">
                    <div class="cart-item-info">
                        <div class="cart-item-title">${escapeHtml(item.nombre)}</div>
                        <div class="cart-item-price">$${item.precio.toFixed(2)} c/u</div>
                    </div>
                    <div class="cart-item-actions">
                        <button class="cart-decr" data-id="${item.id}">−</button>
                        <span>${item.cantidad}</span>
                        <button class="cart-incr" data-id="${item.id}">+</button>
                        <button class="cart-remove" data-id="${item.id}" style="background:#ffdddd;">🗑️</button>
                    </div>
                </div>
            `;
        });

        cartItemsList.innerHTML = html;
        const total = computeTotal();
        cartTotalSpan.textContent = `$${total.toFixed(2)}`;
        updateCartCounter();

        // Agregar event listeners a los botones del carrito
        document.querySelectorAll('.cart-decr').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const id = parseInt(btn.dataset.id);
                updateQuantity(id, -1);
            });
        });
        document.querySelectorAll('.cart-incr').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const id = parseInt(btn.dataset.id);
                updateQuantity(id, 1);
            });
        });
        document.querySelectorAll('.cart-remove').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const id = parseInt(btn.dataset.id);
                removeItemCompletely(id);
            });
        });
    }

    // Modificar cantidad (delta +1 / -1)
    function updateQuantity(productId, delta) {
        const index = cart.findIndex(item => item.id === productId);
        if (index === -1) return;
        const newCantidad = cart[index].cantidad + delta;
        if (newCantidad <= 0) {
            // eliminar producto si cantidad llega a 0
            cart.splice(index, 1);
        } else {
            cart[index].cantidad = newCantidad;
        }
        saveCartToLocal();
        renderCartUI();
    }

    function removeItemCompletely(productId) {
        cart = cart.filter(item => item.id !== productId);
        saveCartToLocal();
        renderCartUI();
        showToast("Producto eliminado");
    }

    // Agregar producto al carrito
    function addToCart(product) {
        const existing = cart.find(item => item.id === product.id);
        if (existing) {
            existing.cantidad += 1;
        } else {
            cart.push({
                id: product.id,
                nombre: product.nombre,
                precio: product.precio,
                cantidad: 1
            });
        }
        saveCartToLocal();
        renderCartUI();
        showToast(`➕ ${product.nombre} añadido`);
    }

    // Finalizar compra
    function checkout() {
        if (cart.length === 0) {
            showToast("❌ El carrito está vacío");
            return;
        }
        const total = computeTotal();
        // Simulación de venta exitosa
        alert(`✅ ¡Compra realizada con éxito!\nTotal: $${total.toFixed(2)}\nGracias por tu compra.`);
        cart = [];
        saveCartToLocal();
        renderCartUI();
        closeCart();
        showToast("🎉 Pedido completado");
    }

    // cerrar carrito
    function openCart() {
        cartOverlay.classList.add("open");
    }
    function closeCart() {
        cartOverlay.classList.remove("open");
    }

    // Renderizar productos en la grilla
    function renderProducts() {
        if (!productsContainer) return;
        let productsHtml = '';
        productos.forEach(prod => {
            productsHtml += `
                <div class="product-card" data-id="${prod.id}">
                    <div class="product-img">${prod.emoji}</div>
                    <div class="product-info">
                        <div class="product-title">${escapeHtml(prod.nombre)}</div>
                        <div class="product-price">${prod.precio.toFixed(2)}</div>
                        <button class="add-to-cart" data-id="${prod.id}">Agregar al carrito</button>
                    </div>
                </div>
            `;
        });
        productsContainer.innerHTML = productsHtml;

        // Asignar eventos a botones "Agregar"
        document.querySelectorAll('.add-to-cart').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const productId = parseInt(btn.dataset.id);
                const product = productos.find(p => p.id === productId);
                if (product) {
                    addToCart(product);
                }
            });
        });
    }

    // Escapar HTML básico (seguridad)
    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
            return c;
        });
    }

    // Eventos de UI del carrito
    cartIcon.addEventListener("click", openCart);
    closeCartBtn.addEventListener("click", closeCart);
    cartOverlay.addEventListener("click", (e) => {
        if (e.target === cartOverlay) closeCart();
    });
    checkoutBtn.addEventListener("click", checkout);

    // Inicializar la tienda
    function init() {
        renderProducts();
        loadCartFromLocal();   // carga carrito previo y refresca vista
    }

    init();
</script>
</body>
</html>
