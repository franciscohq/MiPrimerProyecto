<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiTienda - Catálogo Extendido</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', 'Open Sans', sans-serif;
        }

        body {
            background: #f5f5f5;
            color: #1e1e2a;
            padding: 2rem 1rem;
        }

        .app {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid #ddd;
        }

        h1 {
            font-size: 1.8rem;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .cart-icon {
            background: #2c3e66;
            color: white;
            padding: 0.6rem 1.2rem;
            border-radius: 40px;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        .cart-icon:hover {
            background: #1e2a4a;
            transform: scale(1.02);
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
            margin-bottom: 3rem;
        }

        .product-card {
            background: white;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 30px rgba(0,0,0,0.1);
        }

        .product-img {
            background: linear-gradient(135deg, #eef2f9, #e0e7f5);
            height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
        }

        .product-info {
            padding: 1.2rem;
            flex: 1;
        }

        .product-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .product-price {
            font-size: 1.5rem;
            font-weight: 700;
            color: #2a5298;
            margin: 0.5rem 0;
        }

        .product-price::before {
            content: "$";
            font-size: 1rem;
        }

        .product-stock {
            font-size: 0.8rem;
            color: #666;
            margin-bottom: 0.5rem;
        }

        .add-to-cart {
            background: #2a5298;
            color: white;
            border: none;
            padding: 0.7rem;
            width: 100%;
            font-weight: bold;
            font-size: 1rem;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 0.5rem;
        }

        .add-to-cart:hover {
            background: #0f3b6f;
        }

        .cart-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(3px);
            visibility: hidden;
            opacity: 0;
            transition: 0.3s;
            z-index: 1000;
        }

        .cart-overlay.open {
            visibility: visible;
            opacity: 1;
        }

        .cart-sidebar {
            position: fixed;
            right: 0;
            top: 0;
            width: 100%;
            max-width: 420px;
            height: 100%;
            background: white;
            box-shadow: -5px 0 20px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            transform: translateX(100%);
            transition: transform 0.3s ease-out;
            z-index: 1001;
        }

        .cart-overlay.open .cart-sidebar {
            transform: translateX(0);
        }

        .cart-header {
            padding: 1.5rem;
            border-bottom: 1px solid #e2e2e2;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .cart-header h2 {
            font-size: 1.5rem;
        }

        .close-cart {
            background: none;
            border: none;
            font-size: 1.8rem;
            cursor: pointer;
            font-weight: bold;
        }

        .cart-items {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.8rem 0;
            border-bottom: 1px solid #eee;
        }

        .cart-item-info {
            flex: 1;
        }

        .cart-item-title {
            font-weight: 500;
        }

        .cart-item-price {
            font-size: 0.9rem;
            color: #2a5298;
        }

        .cart-item-actions {
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .cart-item-actions button {
            background: #f0f0f0;
            border: none;
            width: 28px;
            height: 28px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .cart-item-actions button:hover {
            background: #e0e0e0;
        }

        .cart-item-actions span {
            min-width: 24px;
            text-align: center;
        }

        .cart-footer {
            padding: 1.5rem;
            border-top: 2px solid #ddd;
            background: #fafafa;
        }

        .total {
            font-size: 1.4rem;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            margin-bottom: 1.2rem;
        }

        .checkout-btn {
            background: #27ae60;
            width: 100%;
            padding: 0.9rem;
            border: none;
            color: white;
            font-weight: bold;
            font-size: 1.1rem;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.2s;
        }

        .checkout-btn:hover {
            background: #1e8e50;
        }

        .empty-cart {
            text-align: center;
            color: #888;
            padding: 2rem;
        }

        .toast-msg {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e1e2a;
            color: white;
            padding: 0.7rem 1.4rem;
            border-radius: 40px;
            font-size: 0.9rem;
            z-index: 1100;
            opacity: 0;
            transition: 0.2s;
            pointer-events: none;
        }

        .toast-msg.show {
            opacity: 1;
        }

        .category-badge {
            display: inline-block;
            background: #e0e7f5;
            padding: 0.2rem 0.6rem;
            border-radius: 12px;
            font-size: 0.7rem;
            margin-top: 0.3rem;
        }

        @media (max-width: 640px) {
            body {
                padding: 1rem;
            }
            .products-grid {
                gap: 1rem;
            }
        }
    </style>
</head>
<body>
<div class="app">
    <header>
        <h1>🛍️ Tienda Esencia - 30+ Productos</h1>
        <div class="cart-icon" id="cartIcon">
            🛒 Carrito <span id="cartCount">0</span>
        </div>
    </header>

    <div class="products-grid" id="productsContainer"></div>
</div>

<div class="cart-overlay" id="cartOverlay">
    <div class="cart-sidebar">
        <div class="cart-header">
            <h2>Tu carrito</h2>
            <button class="close-cart" id="closeCartBtn">&times;</button>
        </div>
        <div class="cart-items" id="cartItemsList">
            <div class="empty-cart">🛒 El carrito está vacío</div>
        </div>
        <div class="cart-footer">
            <div class="total">
                <span>Total:</span>
                <span id="cartTotal">$0.00</span>
            </div>
            <button class="checkout-btn" id="checkoutBtn">Finalizar compra</button>
        </div>
    </div>
</div>

<div id="toastMsg" class="toast-msg">✨ Producto agregado</div>

<script>
    // ==================== CATÁLOGO EXTENDIDO CON 35 PRODUCTOS ====================
    const productos = [
        // Electrónica
        { id: 1, nombre: "🎧 Auriculares Bluetooth Sony", precio: 89.99, emoji: "🎧", stock: 15, categoria: "Electrónica" },
        { id: 2, nombre: "📱 iPhone 15 Pro", precio: 999.99, emoji: "📱", stock: 8, categoria: "Electrónica" },
        { id: 3, nombre: "💻 MacBook Air M2", precio: 1199.99, emoji: "💻", stock: 5, categoria: "Electrónica" },
        { id: 4, nombre: "⌚ Apple Watch Series 9", precio: 449.99, emoji: "⌚", stock: 12, categoria: "Electrónica" },
        { id: 5, nombre: "🎮 PlayStation 5", precio: 499.99, emoji: "🎮", stock: 3, categoria: "Electrónica" },
        { id: 6, nombre: "📷 Cámara Canon EOS", precio: 649.99, emoji: "📷", stock: 6, categoria: "Electrónica" },
        { id: 7, nombre: "🔊 Parlante JBL Charge", precio: 129.99, emoji: "🔊", stock: 20, categoria: "Electrónica" },
        
        // Accesorios
        { id: 8, nombre: "🎒 Mochila Urbana", precio: 49.90, emoji: "🎒", stock: 18, categoria: "Accesorios" },
        { id: 9, nombre: "⌨️ Teclado Mecánico RGB", precio: 79.90, emoji: "⌨️", stock: 14, categoria: "Accesorios" },
        { id: 10, nombre: "🖱️ Mouse Logitech MX", precio: 89.99, emoji: "🖱️", stock: 22, categoria: "Accesorios" },
        { id: 11, nombre: "🔋 Power Bank 20000mAh", precio: 39.99, emoji: "🔋", stock: 30, categoria: "Accesorios" },
        { id: 12, nombre: "🕶️ Gafas de Sol Polarizadas", precio: 59.99, emoji: "🕶️", stock: 25, categoria: "Accesorios" },
        
        // Ropa
        { id: 13, nombre: "👕 Camiseta Deportiva Nike", precio: 34.50, emoji: "👕", stock: 40, categoria: "Ropa" },
        { id: 14, nombre: "👖 Jeans Slim Fit", precio: 59.99, emoji: "👖", stock: 35, categoria: "Ropa" },
        { id: 15, nombre: "👟 Zapatillas Running Adidas", precio: 89.99, emoji: "👟", stock: 20, categoria: "Ropa" },
        { id: 16, nombre: "🧥 Chaqueta de Cuero", precio: 149.99, emoji: "🧥", stock: 10, categoria: "Ropa" },
        { id: 17, nombre: "🧢 Gorra New Era", precio: 29.99, emoji: "🧢", stock: 45, categoria: "Ropa" },
        
        // Hogar
        { id: 18, nombre: "💡 Lámpara LED Inteligente", precio: 42.20, emoji: "💡", stock: 28, categoria: "Hogar" },
        { id: 19, nombre: "🛋️ Almohadón Decorativo", precio: 24.99, emoji: "🛋️", stock: 50, categoria: "Hogar" },
        { id: 20, nombre: "☕ Cafetera Eléctrica", precio: 89.99, emoji: "☕", stock: 12, categoria: "Hogar" },
        { id: 21, nombre: "🧹 Aspiradora Robot", precio: 249.99, emoji: "🧹", stock: 7, categoria: "Hogar" },
        { id: 22, nombre: "🖼️ Marco Digital 10''", precio: 79.99, emoji: "🖼️", stock: 15, categoria: "Hogar" },
        
        // Libros
        { id: 23, nombre: "📚 El Principito", precio: 18.30, emoji: "📚", stock: 60, categoria: "Libros" },
        { id: 24, nombre: "📖 Cien Años de Soledad", precio: 22.99, emoji: "📖", stock: 45, categoria: "Libros" },
        { id: 25, nombre: "📘 Hábitos Atómicos", precio: 19.99, emoji: "📘", stock: 55, categoria: "Libros" },
        
        // Deportes
        { id: 26, nombre: "⚽ Pelota de Fútbol", precio: 29.99, emoji: "⚽", stock: 30, categoria: "Deportes" },
        { id: 27, nombre: "🏀 Balón de Baloncesto", precio: 34.99, emoji: "🏀", stock: 25, categoria: "Deportes" },
        { id: 28, nombre: "🏋️ Kit de Pesas 20kg", precio: 89.99, emoji: "🏋️", stock: 10, categoria: "Deportes" },
        { id: 29, nombre: "🧘 Yoga Mat Premium", precio: 39.99, emoji: "🧘", stock: 35, categoria: "Deportes" },
        
        // Más electrónica
        { id: 30, nombre: "🎧 AirPods Pro", precio: 249.99, emoji: "🎧", stock: 18, categoria: "Electrónica" },
        { id: 31, nombre: "📱 Samsung Galaxy S23", precio: 899.99, emoji: "📱", stock: 9, categoria: "Electrónica" },
        { id: 32, nombre: "💻 iPad Pro 12.9''", precio: 1099.99, emoji: "💻", stock: 6, categoria: "Electrónica" },
        { id: 33, nombre: "⌚ Garmin Fenix 7", precio: 699.99, emoji: "⌚", stock: 4, categoria: "Electrónica" },
        
        // Juguetes
        { id: 34, nombre: "🧸 Peluche Gigante", precio: 39.99, emoji: "🧸", stock: 25, categoria: "Juguetes" },
        { id: 35, nombre: "🚗 Coche RC 4x4", precio: 59.99, emoji: "🚗", stock: 18, categoria: "Juguetes" },
        { id: 36, nombre: "🎲 Juego de Mesa Monopoly", precio: 44.99, emoji: "🎲", stock: 22, categoria: "Juguetes" }
    ];

    let cart = [];
    let isLoading = false;
    
    // Elementos DOM
    const productsContainer = document.getElementById("productsContainer");
    const cartIcon = document.getElementById("cartIcon");
    const cartOverlay = document.getElementById("cartOverlay");
    const closeCartBtn = document.getElementById("closeCartBtn");
    const cartItemsList = document.getElementById("cartItemsList");
    const cartTotalSpan = document.getElementById("cartTotal");
    const cartCountSpan = document.getElementById("cartCount");
    const checkoutBtn = document.getElementById("checkoutBtn");
    const toastMsg = document.getElementById("toastMsg");
    
    // ==================== FUNCIONES DEL CARRITO ====================
    
    function showToast(message, isError = false) {
        toastMsg.textContent = message;
        toastMsg.style.background = isError ? '#c0392b' : '#1e1e2a';
        toastMsg.classList.add("show");
        setTimeout(() => {
            toastMsg.classList.remove("show");
            toastMsg.style.background = '#1e1e2a';
        }, 2000);
    }
    
    function saveCartToLocal() {
        localStorage.setItem("tiendaCart", JSON.stringify(cart));
    }
    
    function loadCartFromLocal() {
        const stored = localStorage.getItem("tiendaCart");
        if (stored) {
            try {
                cart = JSON.parse(stored);
                if (!Array.isArray(cart)) cart = [];
            } catch(e) { cart = []; }
        } else {
            cart = [];
        }
        renderCartUI();
        updateCartCounter();
    }
    
    function updateCartCounter() {
        const totalItems = cart.reduce((acc, item) => acc + item.cantidad, 0);
        cartCountSpan.textContent = totalItems;
    }
    
    function computeTotal() {
        return cart.reduce((sum, item) => sum + (item.precio * item.cantidad), 0);
    }
    
    function renderCartUI() {
        if (!cartItemsList) return;
        
        if (cart.length === 0) {
            cartItemsList.innerHTML = `<div class="empty-cart">🛒 El carrito está vacío</div>`;
            cartTotalSpan.textContent = `$0.00`;
            updateCartCounter();
            return;
        }
        
        let html = '';
        cart.forEach((item, idx) => {
            html += `
                <div class="cart-item" data-item-id="${item.id}">
                    <div class="cart-item-info">
                        <div class="cart-item-title">${escapeHtml(item.nombre)}</div>
                        <div class="cart-item-price">$${item.precio.toFixed(2)} c/u</div>
                    </div>
                    <div class="cart-item-actions">
                        <button class="cart-decr" data-id="${item.id}">−</button>
                        <span>${item.cantidad}</span>
                        <button class="cart-incr" data-id="${item.id}">+</button>
                        <button class="cart-remove" data-id="${item.id}" style="background:#ffdddd;">🗑️</button>
                    </div>
                </div>
            `;
        });
        
        cartItemsList.innerHTML = html;
        const total = computeTotal();
        cartTotalSpan.textContent = `$${total.toFixed(2)}`;
        updateCartCounter();
        
        document.querySelectorAll('.cart-decr').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const id = parseInt(btn.dataset.id);
                updateQuantity(id, -1);
            });
        });
        document.querySelectorAll('.cart-incr').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const id = parseInt(btn.dataset.id);
                updateQuantity(id, 1);
            });
        });
        document.querySelectorAll('.cart-remove').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const id = parseInt(btn.dataset.id);
                removeItemCompletely(id);
            });
        });
    }
    
    function updateQuantity(productId, delta) {
        const index = cart.findIndex(item => item.id === productId);
        if (index === -1) return;
        const newCantidad = cart[index].cantidad + delta;
        if (newCantidad <= 0) {
            cart.splice(index, 1);
        } else {
            cart[index].cantidad = newCantidad;
        }
        saveCartToLocal();
        renderCartUI();
    }
    
    function removeItemCompletely(productId) {
        cart = cart.filter(item => item.id !== productId);
        saveCartToLocal();
        renderCartUI();
        showToast("Producto eliminado");
    }
    
    function addToCart(product) {
        // Verificar stock
        const productStock = productos.find(p => p.id === product.id)?.stock || 0;
        const existing = cart.find(item => item.id === product.id);
        const currentQuantity = existing ? existing.cantidad : 0;
        
        if (currentQuantity + 1 > productStock) {
            showToast(`❌ Stock insuficiente de ${product.nombre}. Solo quedan ${productStock} unidades`, true);
            return;
        }
        
        if (existing) {
            existing.cantidad += 1;
        } else {
            cart.push({
                id: product.id,
                nombre: product.nombre,
                precio: product.precio,
                cantidad: 1
            });
        }
        saveCartToLocal();
        renderCartUI();
        showToast(`➕ ${product.nombre} añadido al carrito`);
    }
    
    // ==================== CHECKOUT SIMULADO ====================
    async function checkout() {
        if (cart.length === 0) {
            showToast("❌ El carrito está vacío", true);
            return;
        }
        
        const total = computeTotal();
        const orderId = 'ORD-' + Date.now();
        
        // Simular envío a API
        showToast("📤 Procesando compra...");
        
        setTimeout(() => {
            alert(`✅ ¡Compra realizada con éxito!\n\nN° Orden: ${orderId}\nTotal: $${total.toFixed(2)}\nProductos: ${cart.length} ítems\n\nGracias por tu compra en Tienda Esencia 💝`);
            cart = [];
            saveCartToLocal();
            renderCartUI();
            closeCart();
            showToast("🎉 Pedido completado");
        }, 1500);
    }
    
    // ==================== RENDERIZADO DE PRODUCTOS ====================
    function renderProducts() {
        if (!productsContainer) return;
        let productsHtml = '';
        productos.forEach(prod => {
            productsHtml += `
                <div class="product-card" data-id="${prod.id}">
                    <div class="product-img">${prod.emoji}</div>
                    <div class="product-info">
                        <div class="product-title">${escapeHtml(prod.nombre)}</div>
                        <div class="product-price">${prod.precio.toFixed(2)}</div>
                        <div class="product-stock">📦 Stock: ${prod.stock} unidades</div>
                        <span class="category-badge">${prod.categoria}</span>
                        <button class="add-to-cart" data-id="${prod.id}">Agregar al carrito</button>
                    </div>
                </div>
            `;
        });
        productsContainer.innerHTML = productsHtml;
        
        document.querySelectorAll('.add-to-cart').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const productId = parseInt(btn.dataset.id);
                const product = productos.find(p => p.id === productId);
                if (product) {
                    addToCart(product);
                }
            });
        });
    }
    
    function escapeHtml(str) {
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }
    
    // ==================== MANEJADORES DE UI ====================
    function openCart() {
        cartOverlay.classList.add("open");
    }
    
    function closeCart() {
        cartOverlay.classList.remove("open");
    }
    
    cartIcon.addEventListener("click", openCart);
    closeCartBtn.addEventListener("click", closeCart);
    cartOverlay.addEventListener("click", (e) => {
        if (e.target === cartOverlay) closeCart();
    });
    checkoutBtn.addEventListener("click", checkout);
    
    // ==================== INICIALIZACIÓN ====================
    function init() {
        renderProducts();
        loadCartFromLocal();
        showToast(`🛍️ ${productos.length} productos disponibles`);
        console.log(`✅ Tienda iniciada con ${productos.length} productos en catálogo`);
    }
    
    init();
</script>
</body>
</html>
